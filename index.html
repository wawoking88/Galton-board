<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ガルトンボード Web版</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      background: #111;
      color: white;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.65);
      padding: 12px;
      border-radius: 10px;
      width: 260px;
    }

    button {
      margin: 4px;
      padding: 8px 10px;
      cursor: pointer;
    }

    #bins {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
    }

    .bar {
      display: inline-block;
      height: 10px;
      background: white;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h3>ガルトンボード</h3>
    <button id="drop1">玉を1個落とす</button>
    <button id="drop100">玉を100個落とす</button>
    <button id="reset">リセット</button>
    <div id="total">合計: 0個</div>
    <div id="bins"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
      "@dimforge/rapier3d-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.17.3/+esm"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import RAPIER from "@dimforge/rapier3d-compat";

    await RAPIER.init();

    // --------------------
    // 基本設定
    // --------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 16, 34);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 4, 0);
    controls.update();

    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 10, 8);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));

    const world = new RAPIER.World({ x: 0, y: -9.81, z: 0 });

    const objects = [];
    const balls = [];

    const binCount = 11;
    const binCounts = Array(binCount).fill(0);
    let total = 0;

    // --------------------
    // three.js + Rapier連携
    // --------------------
    function addFixedBox(x, y, z, sx, sy, sz, color = 0x777777) {
      const geo = new THREE.BoxGeometry(sx, sy, sz);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      scene.add(mesh);

      const bodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(x, y, z);
      const body = world.createRigidBody(bodyDesc);

      const colliderDesc = RAPIER.ColliderDesc.cuboid(sx / 2, sy / 2, sz / 2)
        .setRestitution(0.55)
        .setFriction(0.15);
      world.createCollider(colliderDesc, body);

      objects.push({ mesh, body });
      return { mesh, body };
    }

    function addPin(x, y, z) {
      const radius = 0.18;
      const height = 1.2;

      const geo = new THREE.CylinderGeometry(radius, radius, height, 24);
      const mat = new THREE.MeshStandardMaterial({ color: 0xffcc66 });
      const mesh = new THREE.Mesh(geo, mat);

      // 円柱を奥行き方向に寝かせる
      mesh.rotation.x = Math.PI / 2;
      mesh.position.set(x, y, z);
      scene.add(mesh);

      const bodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(x, y, z);
      const body = world.createRigidBody(bodyDesc);

      const colliderDesc = RAPIER.ColliderDesc.cylinder(height / 2, radius)
        .setRotation({ x: Math.sin(Math.PI / 4), y: 0, z: 0, w: Math.cos(Math.PI / 4) })
        .setRestitution(0.75)
        .setFriction(0.05);

      world.createCollider(colliderDesc, body);
      objects.push({ mesh, body });
    }

    function dropBall() {
      const radius = 0.22;

      const geo = new THREE.SphereGeometry(radius, 24, 24);
      const mat = new THREE.MeshStandardMaterial({ color: 0x66ccff });
      const mesh = new THREE.Mesh(geo, mat);

      // 少しだけ左右にズラして落とす
      const x = (Math.random() - 0.5) * 0.45;
      const y = 13.5;
      const z = 0;

      mesh.position.set(x, y, z);
      scene.add(mesh);

      const bodyDesc = RAPIER.RigidBodyDesc.dynamic()
        .setTranslation(x, y, z)
        .setLinvel((Math.random() - 0.5) * 0.3, 0, 0);

      const body = world.createRigidBody(bodyDesc);

      const colliderDesc = RAPIER.ColliderDesc.ball(radius)
        .setRestitution(0.65)
        .setFriction(0.05)
        .setDensity(1);

      world.createCollider(colliderDesc, body);

      balls.push({
        mesh,
        body,
        counted: false
      });
    }

    // --------------------
    // ボード作成
    // --------------------

    // 背景板
    addFixedBox(0, 5, -0.7, 18, 18, 0.25, 0x333333);

    // 左右の壁
    addFixedBox(-8.2, 5, 0, 0.3, 17, 1.4, 0x999999);
    addFixedBox(8.2, 5, 0, 0.3, 17, 1.4, 0x999999);

    // 底
    addFixedBox(0, -3.2, 0, 17, 0.3, 1.4, 0x999999);

    // ピン配置
    const rows = 9;
    const spacingX = 1.35;
    const spacingY = 1.25;
    const startY = 10.5;

    for (let r = 0; r < rows; r++) {
      const count = r + 1;
      const y = startY - r * spacingY;
      for (let c = 0; c < count; c++) {
        const x = (c - (count - 1) / 2) * spacingX;
        addPin(x, y, 0);
      }
    }

    // 下の仕切り
    const binWidth = 1.35;
    const leftStart = -binWidth * binCount / 2;

    for (let i = 0; i <= binCount; i++) {
      const x = leftStart + i * binWidth;
      addFixedBox(x, -2.3, 0, 0.12, 1.7, 1.4, 0xffffff);
    }

    // 受け皿の底を少し見やすく
    addFixedBox(0, -1.45, 0.62, binWidth * binCount, 0.08, 0.08, 0xffffff);

    // --------------------
    // カウント表示
    // --------------------
    function updateUI() {
      document.getElementById("total").textContent = `合計: ${total}個`;

      const max = Math.max(...binCounts, 1);
      const binsDiv = document.getElementById("bins");
      binsDiv.innerHTML = "";

      binCounts.forEach((count, i) => {
        const width = Math.max(4, (count / max) * 120);
        binsDiv.innerHTML += `
          <div>
            ${i + 1}番: ${count}
            <span class="bar" style="width:${width}px"></span>
          </div>
        `;
      });
    }

    function countBallIfNeeded(ball) {
      if (ball.counted) return;

      const p = ball.body.translation();

      // 下まで落ちたら箱番号を判定
      if (p.y < -1.4) {
        const index = Math.floor((p.x - leftStart) / binWidth);

        if (index >= 0 && index < binCount) {
          binCounts[index]++;
          total++;
          ball.counted = true;
          updateUI();
        }
      }
    }

    function resetAll() {
      for (const ball of balls) {
        scene.remove(ball.mesh);
        world.removeRigidBody(ball.body);
      }
      balls.length = 0;
      binCounts.fill(0);
      total = 0;
      updateUI();
    }

    updateUI();

    // --------------------
    // ボタン
    // --------------------
    document.getElementById("drop1").onclick = () => {
      dropBall();
    };

    document.getElementById("drop100").onclick = () => {
      let n = 0;
      const timer = setInterval(() => {
        dropBall();
        n++;
        if (n >= 100) clearInterval(timer);
      }, 60);
    };

    document.getElementById("reset").onclick = resetAll;

    // --------------------
    // アニメーション
    // --------------------
    function animate() {
      requestAnimationFrame(animate);

      world.step();

      for (const obj of objects) {
        const p = obj.body.translation();
        obj.mesh.position.set(p.x, p.y, p.z);
      }

      for (const ball of balls) {
        const p = ball.body.translation();
        const q = ball.body.rotation();

        ball.mesh.position.set(p.x, p.y, p.z);
        ball.mesh.quaternion.set(q.x, q.y, q.z, q.w);

        countBallIfNeeded(ball);
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
