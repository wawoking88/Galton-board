<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>ガルトンボード</title>
<style>
body{margin:0;overflow:hidden;background:#111;color:white;font-family:sans-serif;}
#ui{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.72);padding:10px;border-radius:10px;z-index:10;width:270px}
button{padding:7px;margin:3px}
.bar{display:inline-block;height:10px;background:white;margin-left:5px}
.small{font-size:12px;opacity:.9}
</style>
</head>
<body>
<div id="ui">
  <h3>ガルトンボード</h3>

  <div class="small">落とす位置</div>
  
  <button id="posCenter">真ん中</button>
  <button id="posRandom">ランダム</button>

  <div class="small" id="modeText">現在：真ん中</div>

  <hr>

  <button id="drop1">1個落とす</button>
  <button id="drop100">100個</button>
  <button id="drop1000">1000個</button>
  <button id="reset">リセット</button>

  <div id="count">合計: 0</div>
  <div id="bins"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
    "@dimforge/rapier3d-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.17.3/+esm"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import RAPIER from "@dimforge/rapier3d-compat";

await RAPIER.init();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 12, 30);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,4,0);
controls.update();

scene.add(new THREE.AmbientLight(0xffffff,.85));
const light = new THREE.DirectionalLight(0xffffff,1.6);
light.position.set(5,10,8);
scene.add(light);

const world = new RAPIER.World({x:0,y:-6.2,z:0});

const balls = [];
const stackedMeshes = [];

let total = 0;
let dropMode = "center";

const binCount = 13;
const binCounts = Array(binCount).fill(0);
const stacks = Array(binCount).fill(0);

const binWidth = 1.0;
const boardWidth = binWidth * binCount;
const leftStart = -boardWidth / 2;

const ballRadius = 0.12;
const stackGap = 0.25;

function addBox(x,y,z,sx,sy,sz,color=0x888888,transparent=false){
  const mat = new THREE.MeshStandardMaterial({
    color,
    transparent,
    opacity: transparent ? 0.12 : 1,
    depthWrite: !transparent
  });

  const mesh = new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),mat);
  mesh.position.set(x,y,z);
  scene.add(mesh);

  const body = world.createRigidBody(
    RAPIER.RigidBodyDesc.fixed().setTranslation(x,y,z)
  );

  world.createCollider(
    RAPIER.ColliderDesc.cuboid(sx/2,sy/2,sz/2)
      .setRestitution(0)
      .setFriction(1),
    body
  );
}

function addPin(x,y,z){
  const visualRadius = 0.18;
  const hitRadius = 0.12;
  const height = 1.05;

  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(visualRadius,visualRadius,height,32),
    new THREE.MeshStandardMaterial({color:0xffcc66})
  );

  mesh.rotation.x = Math.PI / 2;
  mesh.position.set(x,y,z);
  scene.add(mesh);

  const body = world.createRigidBody(
    RAPIER.RigidBodyDesc.fixed().setTranslation(x,y,z)
  );

  world.createCollider(
    RAPIER.ColliderDesc.ball(hitRadius)
      .setRestitution(0)
      .setFriction(1),
    body
  );
}

function getDropX(){
  if(dropMode === "left"){
    return -4.2 + (Math.random() - 0.5) * 0.25;
  }

  if(dropMode === "center"){
    return 0 + (Math.random() - 0.5) * 0.25;
  }

  if(dropMode === "right"){
    return 4.2 + (Math.random() - 0.5) * 0.25;
  }

  // ランダム：ボード全体の左右どこからでも
  return (Math.random() - 0.5) * 8.8;
}

function dropBall(){
  const x = getDropX();

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(ballRadius,16,16),
    new THREE.MeshStandardMaterial({color:0x66ccff})
  );
  mesh.position.set(x,13.5,0);
  scene.add(mesh);

  const body = world.createRigidBody(
    RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(x,13.5,0)
      .setLinvel(0,0,0)
      .setLinearDamping(1.8)
      .setAngularDamping(1.8)
  );

  world.createCollider(
    RAPIER.ColliderDesc.ball(ballRadius)
      .setRestitution(0)
      .setFriction(1)
      .setDensity(0.7),
    body
  );

  balls.push({mesh,body,counted:false});
}

function addStackBall(index){
  const h = stacks[index];

  const x = leftStart + index * binWidth + binWidth / 2;
  const y = -1.45 - h * stackGap;
  const z = 0;

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(ballRadius,16,16),
    new THREE.MeshStandardMaterial({color:0x66ccff})
  );

  mesh.position.set(x,y,z);
  scene.add(mesh);
  stackedMeshes.push(mesh);

  stacks[index]++;
}

function updateUI(){
  document.getElementById("count").textContent = "合計: " + total;

  const max = Math.max(...binCounts,1);
  const bins = document.getElementById("bins");
  bins.innerHTML = "";

  binCounts.forEach((n,i)=>{
    const w = Math.max(3,(n/max)*120);
    bins.innerHTML += `${i+1}番: ${n}<span class="bar" style="width:${w}px"></span><br>`;
  });
}

function setMode(mode,label){
  dropMode = mode;
  document.getElementById("modeText").textContent = "現在：" + label;
}

// 透明の前後壁
addBox(0,5,-0.40,16,18,0.16,0x66ccff,true);
addBox(0,5, 0.40,16,18,0.16,0x66ccff,true);

// 外枠
addBox(-7.1,5,0,0.3,17,1.2,0x999999);
addBox( 7.1,5,0,0.3,17,1.2,0x999999);
addBox(0,-3.2,0,14.5,0.3,1.2,0x999999);

// 長方形の交互ピン配置
const rows = 10;
const cols = 10;
const pinSpacingX = 1.15;
const pinSpacingY = 1.05;
const startY = 10.4;

for(let r=0;r<rows;r++){
  const y = startY - r * pinSpacingY;
  const offset = (r % 2 === 0) ? 0 : pinSpacingX / 2;

  for(let c=0;c<cols;c++){
    const x = (c - (cols-1)/2) * pinSpacingX + offset;
    if(x > -6.1 && x < 6.1){
      addPin(x,y,0);
    }
  }
}

// 下の仕切り
for(let i=0;i<=binCount;i++){
  const x = leftStart + i * binWidth;
  addBox(x,-2.3,0,0.10,1.7,1.2,0xffffff);
}

updateUI();

function reset(){
  for(const b of balls){
    scene.remove(b.mesh);
    world.removeRigidBody(b.body);
  }

  for(const m of stackedMeshes){
    scene.remove(m);
  }

  balls.length = 0;
  stackedMeshes.length = 0;

  total = 0;
  binCounts.fill(0);
  stacks.fill(0);

  updateUI();
}

function dropMany(num, interval){
  let n = 0;
  const timer = setInterval(()=>{
    dropBall();
    n++;
    if(n >= num) clearInterval(timer);
  }, interval);
}

document.getElementById("posLeft").onclick = () => setMode("left","左");
document.getElementById("posCenter").onclick = () => setMode("center","真ん中");
document.getElementById("posRight").onclick = () => setMode("right","右");
document.getElementById("posRandom").onclick = () => setMode("random","ランダム");

document.getElementById("drop1").onclick = () => dropBall();
document.getElementById("drop100").onclick = () => dropMany(100, 45);
document.getElementById("drop1000").onclick = () => dropMany(1000, 8);
document.getElementById("reset").onclick = reset;

function animate(){
  requestAnimationFrame(animate);

  world.step();

  for(let i=balls.length-1; i>=0; i--){
    const b = balls[i];

    const v = b.body.linvel();

    b.body.setLinvel({
      x: Math.max(-2.0, Math.min(2.0, v.x)),
      y: Math.max(-4.0, Math.min(4.0, v.y)),
      z: Math.max(-0.5, Math.min(0.5, v.z))
    }, true);

    const p = b.body.translation();
    const q = b.body.rotation();

    b.mesh.position.set(p.x,p.y,p.z);
    b.mesh.quaternion.set(q.x,q.y,q.z,q.w);

    if(!b.counted && p.y < -1.45){
      const index = Math.floor((p.x - leftStart) / binWidth);

      if(index >= 0 && index < binCount){
        b.counted = true;

        scene.remove(b.mesh);
        world.removeRigidBody(b.body);
        balls.splice(i,1);

        addStackBall(index);

        binCounts[index]++;
        total++;

        updateUI();
      }
    }
  }

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
