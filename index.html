<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>ガルトンボード</title>
<style>
body{margin:0;overflow:hidden;background:#111;color:white;font-family:sans-serif;}
#ui{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.7);padding:10px;border-radius:10px;z-index:10;width:240px}
button{padding:8px;margin:3px}
.bar{display:inline-block;height:10px;background:white;margin-left:5px}
</style>
</head>
<body>
<div id="ui">
  <h3>ガルトンボード</h3>
  <button id="drop1">1個落とす</button>
  <button id="drop100">100個落とす</button>
  <button id="reset">リセット</button>
  <div id="count">合計: 0</div>
  <div id="bins"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
    "@dimforge/rapier3d-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.17.3/+esm"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import RAPIER from "@dimforge/rapier3d-compat";

await RAPIER.init();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 12, 28);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,4,0);
controls.update();

scene.add(new THREE.AmbientLight(0xffffff,.8));
const light = new THREE.DirectionalLight(0xffffff,1.6);
light.position.set(5,10,8);
scene.add(light);

const world = new RAPIER.World({x:0,y:-6.2,z:0});

const balls = [];
let total = 0;

const binCount = 11;
const binCounts = Array(binCount).fill(0);
const binWidth = 1.15;
const leftStart = -binWidth * binCount / 2;

function addBox(x,y,z,sx,sy,sz,color=0x888888,transparent=false){
  const mat = new THREE.MeshStandardMaterial({
    color,
    transparent,
    opacity: transparent ? 0.12 : 1,
    depthWrite: !transparent
  });

  const mesh = new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),mat);
  mesh.position.set(x,y,z);
  scene.add(mesh);

  const body = world.createRigidBody(
    RAPIER.RigidBodyDesc.fixed().setTranslation(x,y,z)
  );

  world.createCollider(
    RAPIER.ColliderDesc.cuboid(sx/2,sy/2,sz/2)
      .setRestitution(0)
      .setFriction(1),
    body
  );
}

function addPin(x,y,z){
  const visualRadius = 0.2;
  const hitRadius = 0.145; // 見た目より少し小さい当たり判定
  const height = 1.05;

  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(visualRadius,visualRadius,height,32),
    new THREE.MeshStandardMaterial({color:0xffcc66})
  );
  mesh.rotation.x = Math.PI / 2;
  mesh.position.set(x,y,z);
  scene.add(mesh);

  const body = world.createRigidBody(
    RAPIER.RigidBodyDesc.fixed().setTranslation(x,y,z)
  );

  // 円柱ではなく球体にして、正面から見た丸いピンの当たり判定にする
  world.createCollider(
    RAPIER.ColliderDesc.ball(hitRadius)
      .setRestitution(0)
      .setFriction(1),
    body
  );
}

function dropBall(){
  const r = 0.13;
  const x = (Math.random() - 0.5) * 0.18;

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(r,20,20),
    new THREE.MeshStandardMaterial({color:0x66ccff})
  );
  mesh.position.set(x,13.5,0);
  scene.add(mesh);

  const body = world.createRigidBody(
    RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(x,13.5,0)
      .setLinvel(0,0,0)
      .setLinearDamping(1.6)
      .setAngularDamping(1.6)
  );

  world.createCollider(
    RAPIER.ColliderDesc.ball(r)
      .setRestitution(0)
      .setFriction(1)
      .setDensity(0.7),
    body
  );

  balls.push({mesh,body,counted:false});
}

function updateUI(){
  document.getElementById("count").textContent = "合計: " + total;

  const max = Math.max(...binCounts,1);
  const bins = document.getElementById("bins");
  bins.innerHTML = "";

  binCounts.forEach((n,i)=>{
    const w = Math.max(3,(n/max)*120);
    bins.innerHTML += `${i+1}番: ${n}<span class="bar" style="width:${w}px"></span><br>`;
  });
}

// 透明の前後壁
addBox(0,5,-0.42,18,18,0.16,0x66ccff,true);
addBox(0,5, 0.42,18,18,0.16,0x66ccff,true);

// 外枠
addBox(-8.2,5,0,0.3,17,1.2,0x999999);
addBox( 8.2,5,0,0.3,17,1.2,0x999999);
addBox(0,-3.2,0,17,0.3,1.2,0x999999);

// ピン
const rows = 9;
const sx = 1.15;
const sy = 1.15;
const startY = 10.5;

for(let r=0;r<rows;r++){
  const count = r + 1;
  const y = startY - r * sy;

  for(let c=0;c<count;c++){
    const x = (c - (count-1)/2) * sx;
    addPin(x,y,0);
  }
}

// 下の仕切り
for(let i=0;i<=binCount;i++){
  const x = leftStart + i * binWidth;
  addBox(x,-2.3,0,0.12,1.7,1.2,0xffffff);
}

updateUI();

function reset(){
  for(const b of balls){
    scene.remove(b.mesh);
    world.removeRigidBody(b.body);
  }

  balls.length = 0;
  total = 0;
  binCounts.fill(0);
  updateUI();
}

document.getElementById("drop1").onclick = dropBall;

document.getElementById("drop100").onclick = () => {
  let n = 0;
  const timer = setInterval(()=>{
    dropBall();
    n++;
    if(n>=100) clearInterval(timer);
  },90);
};

document.getElementById("reset").onclick = reset;

function animate(){
  requestAnimationFrame(animate);

  world.step();

  for(const b of balls){
    const v = b.body.linvel();

    b.body.setLinvel({
      x: Math.max(-2.0, Math.min(2.0, v.x)),
      y: Math.max(-4.0, Math.min(4.0, v.y)),
      z: Math.max(-0.5, Math.min(0.5, v.z))
    }, true);

    const p = b.body.translation();
    const q = b.body.rotation();

    b.mesh.position.set(p.x,p.y,p.z);
    b.mesh.quaternion.set(q.x,q.y,q.z,q.w);

    if(!b.counted && p.y < -1.45){
      const index = Math.floor((p.x - leftStart) / binWidth);

      if(index >= 0 && index < binCount){
        binCounts[index]++;
        total++;
        b.counted = true;
        updateUI();
      }
    }
  }

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
